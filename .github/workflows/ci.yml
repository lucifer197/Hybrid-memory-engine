name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgres://hybrid:hybrid@localhost:5432/hybrid_memory_test
  REDIS_URL: redis://localhost:6379
  MOCK_EMBEDDINGS: "true"
  NODE_ENV: test

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: TypeScript build + type-check
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc --build --force

  # ──────────────────────────────────────────────────────────────
  # Job 2: DB-backed tests (vector retrieval, golden set, safety)
  # ──────────────────────────────────────────────────────────────
  db-tests:
    name: DB Tests (Postgres + pgvector)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hybrid
          POSTGRES_PASSWORD: hybrid
          POSTGRES_DB: hybrid_memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hybrid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Run all migrations
      - name: Run database migrations
        run: |
          for f in apps/memory-service/src/migrations/*.sql; do
            echo "Running migration: $f"
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          PGPASSWORD: hybrid

      # Run retrieval-orchestrator DB tests
      - name: Retrieval orchestrator tests
        run: npm run test --workspace=apps/retrieval-orchestrator
        env:
          DB_TESTS: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # Run memory-service DB tests
      - name: Memory service tests
        run: npm run test --workspace=apps/memory-service
        env:
          DB_TESTS: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # Run consolidation-worker DB tests
      - name: Consolidation worker tests
        run: npm run test --workspace=apps/consolidation-worker
        env:
          DB_TESTS: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # Run truth-worker DB tests
      - name: Truth worker tests
        run: npm run test --workspace=apps/truth-worker
        env:
          DB_TESTS: "1"
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ──────────────────────────────────────────────────────────────
  # Job 3: Python eval harness (golden set quality metrics)
  # ──────────────────────────────────────────────────────────────
  eval:
    name: Eval Quality Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hybrid
          POSTGRES_PASSWORD: hybrid
          POSTGRES_DB: hybrid_memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hybrid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      # Run migrations
      - name: Run database migrations
        run: |
          for f in apps/memory-service/src/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          PGPASSWORD: hybrid

      # Start backend services in background
      - name: Start services
        run: |
          npm run dev --workspace=apps/memory-service &
          npm run dev --workspace=apps/retrieval-orchestrator &
          npm run dev --workspace=apps/api-gateway &
          sleep 5
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MOCK_EMBEDDINGS: "true"

      # Start embedding worker (Python)
      - name: Start embedding worker
        run: |
          pip install -r apps/embedding-worker/requirements.txt
          python -m src.main &
          sleep 3
        working-directory: apps/embedding-worker
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MOCK_EMBEDDINGS: "true"

      # Install eval deps and run
      - name: Install eval dependencies
        run: pip install -r eval/requirements.txt

      - name: Run evaluation harness
        run: python -m eval.run_eval --wait-timeout 60
        env:
          EVAL_API_URL: http://localhost:3000
          EVAL_TENANT_ID: ci-eval-tenant
          EVAL_WORKSPACE_ID: ci-eval-workspace

      - name: Check quality thresholds
        run: python -m eval.ci_check

      # Upload report as artifact
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval/results/
          retention-days: 30
